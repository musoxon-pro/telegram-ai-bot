<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O‘zbek AI Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .emoji { font-size: 4em; }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        p { opacity: 0.9; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🤖</div>
        <h1>O‘zbek AI Chatbot</h1>
        <p>Men sun'iy intellekt asosida ishlaydigan suhbatdosh botman. O‘zbek tilida bemalol gaplasha olaman. Telegram orqali men bilan do‘stona suhbat quring!</p>
        <a href="https://t.me/Aniluckid_bot" class="btn">💬 Telegram'da ochish</a>
        <p style="font-size: 0.9em; margin-top: 30px;">@your_bot_username - toping va /start bosing</p>
        <p style="font-size: 0.8em; margin-top: 20px;">Vercel serverless | O‘zbekiston 🇺🇿</p>
    </div>
</body>
</html>
